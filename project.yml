name: BrickScan
options:
  bundleIdPrefix: com.lunik
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # The app's UI text is French-only by design; the String Catalog
  # (BrickScan/Resources/Localizable.xcstrings) uses fr as its source language.
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    # Extract Swift string literals into the String Catalog on build (Xcode keeps
    # Localizable.xcstrings in sync automatically once this is on).
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  BrickScan:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrickScan
    info:
      path: BrickScan/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "BrickScan utilise la caméra pour scanner les boîtes et manuels LEGO"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.lunik.brickscan.scan
            UIApplicationShortcutItemTitle: Scanner un set
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeCapturePhoto
          - UIApplicationShortcutItemType: com.lunik.brickscan.manualEntry
            UIApplicationShortcutItemTitle: Saisie manuelle
            UIApplicationShortcutItemIconSymbolName: keyboard
          - UIApplicationShortcutItemType: com.lunik.brickscan.photo
            UIApplicationShortcutItemTitle: Importer une photo
            UIApplicationShortcutItemIconSymbolName: photo.on.rectangle
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lunik.brickscan
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    capabilities:
      com.apple.Keychain: {}

schemes:
  BrickScan:
    build:
      targets:
        BrickScan: all
