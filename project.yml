name: BrickSeeker
options:
  bundleIdPrefix: com.lunik
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  # The app's UI text is French-only by design; the String Catalog
  # (BrickSeeker/Resources/Localizable.xcstrings) uses fr as its source language.
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: YES
    # Do NOT auto-extract Swift string literals into the String Catalog on build.
    # With this on, Xcode rewrites Localizable.xcstrings on every build (reordering
    # entries, adding empty/"new"-state keys), which permanently dirties git status
    # for no benefit on a French-only, single-language app (see #189). The catalog
    # still compiles and works at runtime; new keys are added manually.
    SWIFT_EMIT_LOC_STRINGS: NO

targets:
  BrickSeeker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BrickSeeker
    info:
      path: BrickSeeker/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "BrickSeeker utilise la caméra pour scanner les boîtes et manuels LEGO"
        NSLocationWhenInUseUsageDescription: "BrickSeeker enregistre la position au moment d'un scan (si vous l'activez) pour retrouver le magasin où vous avez vu le meilleur prix. Position approximative, stockée uniquement sur l'appareil."
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: com.lunik.brickseeker.scan
            UIApplicationShortcutItemTitle: Scanner un set
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeCapturePhoto
          - UIApplicationShortcutItemType: com.lunik.brickseeker.manualEntry
            UIApplicationShortcutItemTitle: Saisie manuelle
            UIApplicationShortcutItemIconSymbolName: keyboard
          - UIApplicationShortcutItemType: com.lunik.brickseeker.photo
            UIApplicationShortcutItemTitle: Importer une photo
            UIApplicationShortcutItemIconSymbolName: photo.on.rectangle
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lunik.brickseeker
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    capabilities:
      com.apple.Keychain: {}

schemes:
  BrickSeeker:
    build:
      targets:
        BrickSeeker: all
